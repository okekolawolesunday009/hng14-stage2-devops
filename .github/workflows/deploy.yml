name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo rm -rf /opt/hng-task-two
            sudo mkdir -p /opt/hng-task-two
            sudo chown -R ubuntu:ubuntu /opt/hng-task-two

            git clone https://github.com/okekolawolesunday009/hng14-stage2-devops /opt/hng-task-two/

            cd /opt/hng-task-two/
            sudo apt install docker docker-compose -y
            sudo docker-compose down
            sudo docker-compose up -d --build